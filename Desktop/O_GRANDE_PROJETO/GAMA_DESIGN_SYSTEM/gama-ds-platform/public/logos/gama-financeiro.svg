<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Gold background circle -->
  <circle cx="128" cy="128" r="120" fill="#DAA520" opacity="0.1"/>

  <!-- Main icon container -->
  <g transform="translate(128, 128)">
    <!-- Outer golden ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#DAA520" stroke-width="3"/>

    <!-- Inner circle -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#DAA520" stroke-width="2" opacity="0.5"/>

    <!-- Financial chart/growth element -->
    <g transform="translate(-35, 20)">
      <!-- Upward trend line -->
      <path d="M 0 40 L 25 20 L 50 10 L 75 0"
            fill="none"
            stroke="#DAA520"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"/>

      <!-- Data points -->
      <circle cx="0" cy="40" r="3" fill="#DAA520"/>
      <circle cx="25" cy="20" r="3" fill="#DAA520"/>
      <circle cx="50" cy="10" r="3" fill="#DAA520"/>
      <circle cx="75" cy="0" r="3" fill="#DAA520"/>
    </g>

    <!-- Currency symbol (subtle) -->
    <text x="30" y="-10"
          font-size="28"
          font-weight="bold"
          fill="#DAA520"
          opacity="0.7"
          font-family="Poppins">$</text>

    <!-- Shield/Trust element -->
    <path d="M -60 -50 L -60 -20 Q -60 0 -40 10 Q -40 0 -20 10 Q 0 0 0 20 Q 0 10 20 10 Q 40 0 40 -20 L 40 -50 Z"
          fill="none"
          stroke="#DAA520"
          stroke-width="2"
          opacity="0.6"/>

    <!-- Bottom text: GAMA FINANCEIRO -->
    <text x="0" y="75"
          font-size="18"
          font-weight="700"
          fill="#DAA520"
          text-anchor="middle"
          font-family="Poppins">GAMA</text>
    <text x="0" y="98"
          font-size="14"
          font-weight="600"
          fill="#DAA520"
          text-anchor="middle"
          font-family="Poppins"
          opacity="0.8">FINANCEIRO</text>
  </g>
</svg>
