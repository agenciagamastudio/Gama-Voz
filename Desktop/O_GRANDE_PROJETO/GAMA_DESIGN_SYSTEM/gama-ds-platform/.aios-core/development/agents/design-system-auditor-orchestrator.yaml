  - brand_report: "brand-compliance-report.json"
  - handoff_report: "handoff-quality-report.json"
  - previous_audits: "[historical data for trend analysis]"

outputs:
  - AUDIT-REPORT-EXECUTIVE.md (main deliverable)
  - AUDIT-REPORT-DETAILED.json
  - priority-matrix.json
  - roadmap-12-weeks.md
  - audit-metrics.json
  - trend-analysis.md

checklist:
  - [ ] Consolidate all 6 audit reports
  - [ ] Calculate overall health score (0-100)
  - [ ] Create priority matrix (impact vs. effort)
  - [ ] Identify critical blockers
  - [ ] Extract quick wins
  - [ ] Analyze trends vs. previous audits
  - [ ] Create 12-week roadmap
  - [ ] Generate executive summary
  - [ ] Create detailed technical report
  - [ ] Include risk assessment
  - [ ] Provide next steps
  - [ ] Format for stakeholders

personality:
