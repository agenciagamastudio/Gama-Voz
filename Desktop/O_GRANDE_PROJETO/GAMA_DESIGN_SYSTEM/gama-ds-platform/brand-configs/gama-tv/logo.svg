<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Gama TV Logo (Red/Orange Primary) -->
  <defs>
    <linearGradient id="tvGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B91C1C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#DC2626" opacity="0.1"/>

  <!-- Main icon container -->
  <g transform="translate(128, 128)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#DC2626" stroke-width="3"/>

    <!-- TV symbol: Monitor/Screen -->
    <g transform="translate(-25, -15)">
      <!-- Screen -->
      <rect x="5" y="0" width="50" height="35" fill="none" stroke="#DC2626" stroke-width="2" rx="2"/>
      <!-- Screen content: waves (signal) -->
      <path d="M 15 15 Q 20 10 25 15 Q 30 20 35 15 Q 40 10 45 15" fill="none" stroke="#DC2626" stroke-width="1.5"/>
      <path d="M 15 22 Q 20 18 25 22 Q 30 26 35 22 Q 40 18 45 22" fill="none" stroke="#DC2626" stroke-width="1.5"/>
      <!-- Stand -->
      <rect x="18" y="35" width="14" height="5" fill="#DC2626"/>
    </g>

    <!-- Bottom text: GAMA TV -->
    <text x="0" y="75"
          font-size="18"
          font-weight="700"
          fill="#DC2626"
          text-anchor="middle"
          font-family="Poppins">GAMA</text>
    <text x="0" y="98"
          font-size="14"
          font-weight="600"
          fill="#DC2626"
          text-anchor="middle"
          font-family="Poppins"
          opacity="0.9">TV</text>
  </g>
</svg>
