<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Gama Calendários Logo (Blue Primary) -->
  <defs>
    <linearGradient id="calendarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284C7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#0EA5E9" opacity="0.1"/>

  <!-- Main icon container -->
  <g transform="translate(128, 128)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#0EA5E9" stroke-width="3"/>

    <!-- Calendar symbol -->
    <g transform="translate(-25, -15)">
      <!-- Calendar body -->
      <rect x="5" y="8" width="40" height="35" fill="none" stroke="#0EA5E9" stroke-width="2" rx="2"/>
      <!-- Top bar with date header -->
      <rect x="5" y="8" width="40" height="8" fill="#0EA5E9" opacity="0.2"/>
      <!-- Tabs (month/year indicators) -->
      <rect x="8" y="5" width="3" height="5" fill="#0EA5E9"/>
      <rect x="37" y="5" width="3" height="5" fill="#0EA5E9"/>
      <!-- Grid (calendar dates) -->
      <line x1="15" y1="20" x2="35" y2="20" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
      <line x1="15" y1="26" x2="35" y2="26" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
      <line x1="15" y1="32" x2="35" y2="32" stroke="#0EA5E9" stroke-width="1" opacity="0.5"/>
      <!-- Date marker -->
      <circle cx="28" cy="23" r="2" fill="#0EA5E9"/>
    </g>

    <!-- Bottom text: GAMA CALENDÁRIOS -->
    <text x="0" y="75"
          font-size="18"
          font-weight="700"
          fill="#0EA5E9"
          text-anchor="middle"
          font-family="Poppins">GAMA</text>
    <text x="0" y="98"
          font-size="12"
          font-weight="600"
          fill="#0EA5E9"
          text-anchor="middle"
          font-family="Poppins"
          opacity="0.9">CALENDÁRIOS</text>
  </g>
</svg>
