<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Gama Rádio Logo (Purple Primary) -->
  <defs>
    <linearGradient id="radioGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D28D9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#7C3AED" opacity="0.1"/>

  <!-- Main icon container -->
  <g transform="translate(128, 128)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#7C3AED" stroke-width="3"/>

    <!-- Radio symbol: Sound waves -->
    <g transform="translate(-35, -10)">
      <!-- Radio body -->
      <rect x="15" y="10" width="30" height="25" fill="none" stroke="#7C3AED" stroke-width="2" rx="2"/>
      <!-- Antenna -->
      <line x1="22" y1="10" x2="20" y2="-5" stroke="#7C3AED" stroke-width="2"/>
      <line x1="28" y1="10" x2="30" y2="-8" stroke="#7C3AED" stroke-width="2"/>
      <!-- Tuning dial -->
      <circle cx="30" cy="20" r="6" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
      <line x1="30" y1="15" x2="30" y2="12" stroke="#7C3AED" stroke-width="1.5"/>
      <!-- Sound waves -->
      <path d="M 45 15 Q 50 15 50 20 Q 50 25 45 25" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
      <path d="M 48 12 Q 53 12 53 20 Q 53 28 48 28" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
    </g>

    <!-- Bottom text: GAMA RÁDIO -->
    <text x="0" y="75"
          font-size="18"
          font-weight="700"
          fill="#7C3AED"
          text-anchor="middle"
          font-family="Poppins">GAMA</text>
    <text x="0" y="98"
          font-size="14"
          font-weight="600"
          fill="#7C3AED"
          text-anchor="middle"
          font-family="Poppins"
          opacity="0.9">RÁDIO</text>
  </g>
</svg>
